name: Benchmark Comment

on:
  workflow_run:
    workflows: [ "Benchmarks" ]
    types: [ completed ]

permissions:
  pull-requests: write

jobs:
  comment:
    if: github.event.workflow_run.event == 'pull_request' && github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
    - name: Download benchmark results
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: benchmark-results
        path: results
        run-id: ${{ github.event.workflow_run.id }}
        github-token: ${{ secrets.GITHUB_TOKEN }}

    - name: Get PR number
      id: pr
      shell: bash
      run: |
        set -euo pipefail

        PR_NUMBER=''

        # Read PR number saved by the benchmark workflow
        if [ -f results/pr-number.txt ]; then
          PR_NUMBER=$(tr -d '[:space:]' < results/pr-number.txt)
        fi

        if [ -z "$PR_NUMBER" ] || [ "$PR_NUMBER" = "null" ]; then
          echo "Could not determine PR number, skipping comment"
          echo "skip=true" >> "$GITHUB_OUTPUT"
        else
          echo "number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Build comment body
      if: steps.pr.outputs.skip != 'true'
      id: body
      shell: bash
      run: |
        set -euo pipefail

        # Keep only metric sections with at least one significant benchmark row.
        # Data rows are identified by the "(p=" suffix benchstat emits; rows with
        # "~ (p=" are insignificant and dropped. Geomean and footnote lines flow
        # through as decoration but do not keep a section alive on their own.
        filter_benchstat() {
          awk '
          BEGIN { hdr=""; rows=""; has=0 }
          /^(goos|goarch|pkg|cpu):/ { next }
          /^[[:space:]]*│/ { hdr = hdr $0 "\n"; next }
          /^[[:space:]]*$/ {
            if (has) {
              printf "%s%s\n", hdr, rows
            }
            hdr=""; rows=""; has=0
            next
          }
          /\(p=/ {
            if ($0 !~ /~ \(p=/) {
              rows = rows $0 "\n"
              has=1
            }
            next
          }
          { rows = rows $0 "\n" }
          END {
            if (has) {
              printf "%s%s", hdr, rows
            }
          }
          ' "$1"
        }

        render_benchstat_section() {
          local title=$1
          local stat_file=$2
          local raw_file=$3

          if [ -f "$stat_file" ] && [ -s "$stat_file" ]; then
            local filtered
            filtered=$(filter_benchstat "$stat_file")

            if [ -n "$filtered" ]; then
              echo "### $title"
              echo ''
              echo '```'
              echo "$filtered"
              echo '```'
            else
              echo "**$title:** No significant changes."
              echo ''
              echo "<details><summary>$title (full comparison)</summary>"
              echo ''
              echo '```'
              cat "$stat_file"
              echo '```'
              echo ''
              echo '</details>'
            fi
          elif [ -f "$raw_file" ]; then
            echo "<details><summary>$title (no base to compare)</summary>"
            echo ''
            echo '```'
            cat "$raw_file"
            echo '```'
            echo ''
            echo '</details>'
          fi
        }

        {
          echo 'COMMENT<<EOF'
          echo '## Benchmark Results'
          echo ''

          render_benchstat_section "Library Benchmarks" results/lib-stat.txt results/pr-lib.txt

          echo ''

          render_benchstat_section "Performance Benchmarks" results/perf-stat.txt results/pr-perf.txt

          echo 'EOF'
        } >> "$GITHUB_OUTPUT"

    - name: Comment on PR
      if: steps.pr.outputs.skip != 'true'
      uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0 # v3.0.4
      with:
        header: benchmark
        number: ${{ steps.pr.outputs.number }}
        message: ${{ steps.body.outputs.COMMENT }}
