name: Post Release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions: read-all

jobs:
  binaries:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Set up Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version: '1.25'

    - name: Extract version
      id: version
      run: |
        if [ "${{ github.event_name }}" = "release" ]; then
          echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          echo "tag=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
        else
          version=$(grep -oP 'Version = "\K[^"]+' codegen/version.go)
          echo "version=$version" >> $GITHUB_OUTPUT
          echo "tag=v$version" >> $GITHUB_OUTPUT
        fi

    - name: Build dynssz-gen for multiple platforms
      run: |
        LDFLAGS_PKG="github.com/pk910/dynamic-ssz/codegen"
        BUILD_COMMIT="${{ steps.version.outputs.tag }}"
        BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)
        LDFLAGS="-s -w -X ${LDFLAGS_PKG}.BuildCommit=${BUILD_COMMIT} -X ${LDFLAGS_PKG}.BuildTime=${BUILD_TIME}"

        cd dynssz-gen

        # Linux amd64
        GOOS=linux GOARCH=amd64 go build -ldflags="${LDFLAGS}" -o ../dynssz-gen-linux-amd64 .

        # Linux arm64
        GOOS=linux GOARCH=arm64 go build -ldflags="${LDFLAGS}" -o ../dynssz-gen-linux-arm64 .

        # Windows amd64
        GOOS=windows GOARCH=amd64 go build -ldflags="${LDFLAGS}" -o ../dynssz-gen-windows-amd64.exe .

        # macOS amd64
        GOOS=darwin GOARCH=amd64 go build -ldflags="${LDFLAGS}" -o ../dynssz-gen-darwin-amd64 .

        # macOS arm64
        GOOS=darwin GOARCH=arm64 go build -ldflags="${LDFLAGS}" -o ../dynssz-gen-darwin-arm64 .

    - name: Generate artifact attestations
      uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v2
      with:
        subject-path: |
          dynssz-gen-linux-amd64
          dynssz-gen-linux-arm64
          dynssz-gen-windows-amd64.exe
          dynssz-gen-darwin-amd64
          dynssz-gen-darwin-arm64

    - name: Upload binaries to release
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        version="${{ steps.version.outputs.version }}"
        tag="${{ steps.version.outputs.tag }}"

        gh release upload "$tag" \
          "dynssz-gen-linux-amd64#dynssz-gen-${version}-linux-amd64" \
          "dynssz-gen-linux-arm64#dynssz-gen-${version}-linux-arm64" \
          "dynssz-gen-windows-amd64.exe#dynssz-gen-${version}-windows-amd64.exe" \
          "dynssz-gen-darwin-amd64#dynssz-gen-${version}-darwin-amd64" \
          "dynssz-gen-darwin-arm64#dynssz-gen-${version}-darwin-arm64"

  changelog:
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    permissions:
      contents: write
    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        ref: master
        token: ${{ secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}

    - name: Extract release info
      id: release_info
      run: |
        echo "tag=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
        echo "date=$(echo '${{ github.event.release.published_at }}' | cut -dT -f1)" >> $GITHUB_OUTPUT

    - name: Update CHANGELOG.md
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        chmod +x .github/scripts/update-changelog.sh
        .github/scripts/update-changelog.sh "${{ steps.release_info.outputs.tag }}" "${{ steps.release_info.outputs.date }}"

    - uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v7.1.0
      with:
        commit_message: "update CHANGELOG.md for ${{ github.event.release.tag_name }}"
        branch: master
        file_pattern: CHANGELOG.md

  docker:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

    - name: Login to Docker Hub
      uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Extract version
      id: version
      run: |
        if [ "${{ github.event_name }}" = "release" ]; then
          echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          echo "tag=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
        else
          version=$(grep -oP 'Version = "\K[^"]+' codegen/version.go)
          echo "version=$version" >> $GITHUB_OUTPUT
          echo "tag=v$version" >> $GITHUB_OUTPUT
        fi

    - name: Build and push Docker image
      uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
      with:
        context: .
        push: true
        tags: |
          pk910/dynamic-ssz:${{ steps.version.outputs.version }}
          pk910/dynamic-ssz:latest
        platforms: linux/amd64,linux/arm64
        build-args: |
          BUILD_COMMIT=${{ steps.version.outputs.tag }}
          BUILD_TIME=${{ github.event.release.published_at || github.event.repository.updated_at }}
