name: Post Release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions: read-all

jobs:
  binaries:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
    - name: Checkout code
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

    - name: Set up Go
      uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
      with:
        go-version: '1.25'

    - name: Extract version
      id: version
      run: |
        if [ "${{ github.event_name }}" = "release" ]; then
          echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          echo "tag=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
        else
          version=$(grep -oP 'Version = "\K[^"]+' codegen/version.go)
          echo "version=$version" >> $GITHUB_OUTPUT
          echo "tag=v$version" >> $GITHUB_OUTPUT
        fi

    - name: Build dynssz-gen for multiple platforms
      run: |
        LDFLAGS_PKG="github.com/pk910/dynamic-ssz/codegen"
        BUILD_COMMIT="${{ steps.version.outputs.tag }}"
        BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)
        LDFLAGS="-s -w -X ${LDFLAGS_PKG}.BuildCommit=${BUILD_COMMIT} -X ${LDFLAGS_PKG}.BuildTime=${BUILD_TIME}"

        cd dynssz-gen

        # Linux amd64
        GOOS=linux GOARCH=amd64 go build -ldflags="${LDFLAGS}" -o ../dynssz-gen-linux-amd64 .

        # Linux arm64
        GOOS=linux GOARCH=arm64 go build -ldflags="${LDFLAGS}" -o ../dynssz-gen-linux-arm64 .

        # Windows amd64
        GOOS=windows GOARCH=amd64 go build -ldflags="${LDFLAGS}" -o ../dynssz-gen-windows-amd64.exe .

        # macOS amd64
        GOOS=darwin GOARCH=amd64 go build -ldflags="${LDFLAGS}" -o ../dynssz-gen-darwin-amd64 .

        # macOS arm64
        GOOS=darwin GOARCH=arm64 go build -ldflags="${LDFLAGS}" -o ../dynssz-gen-darwin-arm64 .

    - name: Generate artifact attestations
      uses: actions/attest-build-provenance@db473fddc028af60658334401dc6fa3ffd8669fd # v2
      with:
        subject-path: |
          dynssz-gen-linux-amd64
          dynssz-gen-linux-arm64
          dynssz-gen-windows-amd64.exe
          dynssz-gen-darwin-amd64
          dynssz-gen-darwin-arm64

    - name: Upload binaries to release
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        version="${{ steps.version.outputs.version }}"
        tag="${{ steps.version.outputs.tag }}"

        gh release upload "$tag" \
          "dynssz-gen-linux-amd64#dynssz-gen-${version}-linux-amd64" \
          "dynssz-gen-linux-arm64#dynssz-gen-${version}-linux-arm64" \
          "dynssz-gen-windows-amd64.exe#dynssz-gen-${version}-windows-amd64.exe" \
          "dynssz-gen-darwin-amd64#dynssz-gen-${version}-darwin-amd64" \
          "dynssz-gen-darwin-arm64#dynssz-gen-${version}-darwin-arm64"

  docker:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
    - name: Checkout code
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

    - name: Login to Docker Hub
      uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Extract version
      id: version
      run: |
        if [ "${{ github.event_name }}" = "release" ]; then
          echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          echo "tag=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
        else
          version=$(grep -oP 'Version = "\K[^"]+' codegen/version.go)
          echo "version=$version" >> $GITHUB_OUTPUT
          echo "tag=v$version" >> $GITHUB_OUTPUT
        fi

    - name: Build and push Docker image
      uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
      with:
        context: .
        push: true
        tags: |
          pk910/dynamic-ssz:${{ steps.version.outputs.version }}
          pk910/dynamic-ssz:latest
        platforms: linux/amd64,linux/arm64
        build-args: |
          BUILD_COMMIT=${{ steps.version.outputs.tag }}
          BUILD_TIME=${{ github.event.release.published_at || github.event.repository.updated_at }}
