name: Benchmarks

on:
  pull_request:
    branches: [ master, main ]

concurrency:
  group: benchmark-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
    - name: Checkout PR
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        path: pr
        # On pull_request events the default ref is the merge commit
        # (refs/pull/N/merge). Fetch its parents so the exact base it was merged
        # into can be derived below.
        fetch-depth: 2

    - name: Determine base commit
      id: basecommit
      run: |
        set -euo pipefail
        # The merge commit's first parent is the precise base-branch commit the
        # PR is merged into, so base and PR differ only by the PR's changes.
        # github.event.pull_request.base.sha can lag the real merge base, which
        # would fold unrelated master commits into the comparison. Fall back to
        # it only when HEAD is not a merge commit (e.g. unmergeable PRs).
        if git -C pr rev-parse --verify -q HEAD^2 >/dev/null; then
          BASE_SHA="$(git -C pr rev-parse HEAD^1)"
        else
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
        fi
        echo "Base commit for benchmark comparison: ${BASE_SHA}"
        echo "sha=${BASE_SHA}" >> "$GITHUB_OUTPUT"

    - name: Checkout base
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        ref: ${{ steps.basecommit.outputs.sha }}
        path: base

    - name: Set up Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version: '1.25.11'

    - name: Install benchstat
      run: go install golang.org/x/perf/cmd/benchstat@v0.0.0-20260312031701-16a31bc5fbd0

    - name: Prepare output directory
      run: |
        mkdir -p bench-results
        echo "${{ github.event.pull_request.number }}" > bench-results/pr-number.txt

    - name: Download test data
      run: |
        cd pr/tests/perftests
        ./setup_testdata.sh
        cp -r res ../../../base/tests/perftests/res 2>/dev/null || true

    - name: Generate codegen (PR)
      run: |
        cd pr/tests/perftests
        go generate ./...

    - name: Generate codegen (base)
      continue-on-error: true
      run: |
        cd base/tests/perftests
        # go mod tidy heals stale go.sum entries when the base commit predates
        # a dynssz-gen dependency bump present in the PR. Without this, codegen
        # fails silently and Codegen_* benchmarks fall back to reflection,
        # producing spurious large diffs against PR's real generated code.
        go mod tidy
        go generate ./...

    - name: Check base codegen
      id: base_codegen_check
      run: |
        if ls base/tests/perftests/gen_*.go >/dev/null 2>&1; then
          echo "has_codegen=true" >> "$GITHUB_OUTPUT"
        else
          echo "::warning::Base codegen produced no gen_*.go files. Codegen_* benchmarks will be skipped to avoid comparing reflection fallback against real generated code."
          echo "has_codegen=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Cache Go modules
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-go-bench-${{ hashFiles('pr/tests/perftests/go.sum') }}

    - name: Sync benchmark harness to base
      run: |
        set -euo pipefail

        synced=0
        while IFS= read -r dir; do
          if [ -z "$dir" ] || [ ! -d "base/$dir" ]; then
            continue
          fi

          mapfile -t pr_tests < <(
            find "pr/$dir" -maxdepth 1 -type f -name '*_test.go' |
              LC_ALL=C sort
          )
          mapfile -t base_tests < <(
            find "base/$dir" -maxdepth 1 -type f -name '*_test.go' |
              LC_ALL=C sort
          )

          if [ "${#pr_tests[@]}" -eq 0 ]; then
            continue
          fi

          changed=0
          if [ "${#pr_tests[@]}" -ne "${#base_tests[@]}" ]; then
            changed=1
          else
            for i in "${!pr_tests[@]}"; do
              pr_file="${pr_tests[$i]}"
              base_file="${base_tests[$i]}"
              if [ "${pr_file#pr/}" != "${base_file#base/}" ] || ! cmp -s "$pr_file" "$base_file"; then
                changed=1
                break
              fi
            done
          fi

          if [ "$changed" -eq 0 ]; then
            continue
          fi

          rm -f "base/$dir"/*_test.go

          for test_file in "${pr_tests[@]}"; do
            cp "$test_file" "base/${test_file#pr/}"
          done

          synced=$((synced + 1))
          echo "Synced benchmark harness in $dir (${#pr_tests[@]} test files)"
        done < <(
          cd pr
          git grep -l '^[[:space:]]*func Benchmark' -- '*_test.go' |
            xargs -r -n1 dirname |
            sort -u
        )

        echo "Synced benchmark harness for $synced packages from PR into base checkout"

    - name: Run library benchmarks
      run: |
        OUTDIR="$GITHUB_WORKSPACE/bench-results"

        # Discover library benchmark names from PR (tests/ is a separate module)
        BENCHMARKS=$(cd pr && go test -list '^Benchmark' -run '^$' ./... 2>/dev/null | grep '^Benchmark' | sort -u)
        if [ -z "$BENCHMARKS" ]; then
          echo "No library benchmarks found"
          exit 0
        fi
        echo "Library benchmarks found:"
        echo "$BENCHMARKS"

        # Phase 1: run each benchmark once, alternating base/PR
        echo "--- Phase 1: single pass ---"
        for bench in $BENCHMARKS; do
          echo "  $bench"
          (cd base && go test -run='^$' -bench="^${bench}\$" -benchmem -count=1 -benchtime=2s -timeout=5m ./...) >> "$OUTDIR/base-lib.txt" 2>&1 || true
          (cd pr   && go test -run='^$' -bench="^${bench}\$" -benchmem -count=1 -benchtime=2s -timeout=5m ./...) >> "$OUTDIR/pr-lib.txt" 2>&1
        done

        # Find top-level benchmarks where any sub-benchmark differs by >5%
        RERUN=$(awk '
          FNR==NR && /^Benchmark.*ns\/op/ {
            for(i=2;i<=NF;i++) if($i=="ns/op"){base[$1]=$(i-1)+0;break}; next
          }
          /^Benchmark.*ns\/op/ {
            for(i=2;i<=NF;i++) if($i=="ns/op"){pr[$1]=$(i-1)+0;break}
          }
          END {
            for(n in pr){
              if(!(n in base)||base[n]==0) continue
              d=(pr[n]-base[n])/base[n]*100; if(d<0)d=-d
              if(d>5){t=n;s=index(t,"/");if(s>0)t=substr(t,1,s-1);else sub(/-[0-9]+$/,"",t);print t}
            }
          }
        ' "$OUTDIR/base-lib.txt" "$OUTDIR/pr-lib.txt" | sort -u)

        if [ -z "$RERUN" ]; then
          echo "--- No significant diffs, skipping phase 2 ---"
          exit 0
        fi

        # Phase 2: re-run interesting benchmarks 5 more times to confirm
        echo "--- Phase 2: confirming diffs ---"
        echo "$RERUN"
        for bench in $RERUN; do
          echo "  $bench (7 confirmation runs)"
          for i in $(seq 1 7); do
            # Alternate which side runs first. Running base and pr back-to-back
            # under sustained load means the second run executes on an
            # already-warmed (often frequency-throttled) CPU; always running the
            # same side second creates a systematic bias. Alternating cancels it.
            if [ $((i % 2)) -eq 1 ]; then
              (cd base && go test -run='^$' -bench="^${bench}\$" -benchmem -count=1 -benchtime=2s -timeout=5m ./...) >> "$OUTDIR/base-lib.txt" 2>&1 || true
              (cd pr   && go test -run='^$' -bench="^${bench}\$" -benchmem -count=1 -benchtime=2s -timeout=5m ./...) >> "$OUTDIR/pr-lib.txt" 2>&1
            else
              (cd pr   && go test -run='^$' -bench="^${bench}\$" -benchmem -count=1 -benchtime=2s -timeout=5m ./...) >> "$OUTDIR/pr-lib.txt" 2>&1
              (cd base && go test -run='^$' -bench="^${bench}\$" -benchmem -count=1 -benchtime=2s -timeout=5m ./...) >> "$OUTDIR/base-lib.txt" 2>&1 || true
            fi
          done
        done

    - name: Run perf benchmarks
      env:
        HAS_BASE_CODEGEN: ${{ steps.base_codegen_check.outputs.has_codegen }}
      run: |
        OUTDIR="$GITHUB_WORKSPACE/bench-results"

        # Discover perf benchmark names from PR
        BENCHMARKS=$(cd pr/tests/perftests && go test -list '^Benchmark' -run '^$' 2>/dev/null | grep '^Benchmark' | sort -u)
        if [ "$HAS_BASE_CODEGEN" != "true" ]; then
          # Skip Codegen_* benchmarks: base has no generated code so DynSsz would
          # transparently fall back to reflection, producing a meaningless
          # reflection-vs-codegen comparison.
          BENCHMARKS=$(echo "$BENCHMARKS" | grep -v '^BenchmarkCodegen_' || true)
        fi
        if [ -z "$BENCHMARKS" ]; then
          echo "No perf benchmarks found"
          exit 0
        fi
        echo "Perf benchmarks found:"
        echo "$BENCHMARKS"

        # Phase 1: run each benchmark once, alternating base/PR
        echo "--- Phase 1: single pass ---"
        for bench in $BENCHMARKS; do
          echo "  $bench"
          (cd base/tests/perftests && go test -run='^$' -bench="^${bench}\$" -benchmem -count=1 -benchtime=2s -timeout=10m) >> "$OUTDIR/base-perf.txt" 2>&1 || true
          (cd pr/tests/perftests   && go test -run='^$' -bench="^${bench}\$" -benchmem -count=1 -benchtime=2s -timeout=10m) >> "$OUTDIR/pr-perf.txt" 2>&1
        done

        # Find top-level benchmarks where any sub-benchmark differs by >5%
        RERUN=$(awk '
          FNR==NR && /^Benchmark.*ns\/op/ {
            for(i=2;i<=NF;i++) if($i=="ns/op"){base[$1]=$(i-1)+0;break}; next
          }
          /^Benchmark.*ns\/op/ {
            for(i=2;i<=NF;i++) if($i=="ns/op"){pr[$1]=$(i-1)+0;break}
          }
          END {
            for(n in pr){
              if(!(n in base)||base[n]==0) continue
              d=(pr[n]-base[n])/base[n]*100; if(d<0)d=-d
              if(d>5){t=n;s=index(t,"/");if(s>0)t=substr(t,1,s-1);else sub(/-[0-9]+$/,"",t);print t}
            }
          }
        ' "$OUTDIR/base-perf.txt" "$OUTDIR/pr-perf.txt" | sort -u)

        if [ -z "$RERUN" ]; then
          echo "--- No significant diffs, skipping phase 2 ---"
          exit 0
        fi

        # Phase 2: re-run interesting benchmarks 5 more times to confirm
        echo "--- Phase 2: confirming diffs ---"
        echo "$RERUN"
        for bench in $RERUN; do
          echo "  $bench (7 confirmation runs)"
          for i in $(seq 1 7); do
            # Alternate which side runs first so sustained-load CPU frequency
            # throttling does not systematically penalize the side that always
            # runs second (see the library benchmark step for details).
            if [ $((i % 2)) -eq 1 ]; then
              (cd base/tests/perftests && go test -run='^$' -bench="^${bench}\$" -benchmem -count=1 -benchtime=2s -timeout=10m) >> "$OUTDIR/base-perf.txt" 2>&1 || true
              (cd pr/tests/perftests   && go test -run='^$' -bench="^${bench}\$" -benchmem -count=1 -benchtime=2s -timeout=10m) >> "$OUTDIR/pr-perf.txt" 2>&1
            else
              (cd pr/tests/perftests   && go test -run='^$' -bench="^${bench}\$" -benchmem -count=1 -benchtime=2s -timeout=10m) >> "$OUTDIR/pr-perf.txt" 2>&1
              (cd base/tests/perftests && go test -run='^$' -bench="^${bench}\$" -benchmem -count=1 -benchtime=2s -timeout=10m) >> "$OUTDIR/base-perf.txt" 2>&1 || true
            fi
          done
        done

    - name: Run benchstat comparisons
      run: |
        cd "$GITHUB_WORKSPACE/bench-results"
        benchstat -confidence 0.98 base-lib.txt pr-lib.txt > lib-stat.txt 2>&1 || true
        benchstat -confidence 0.98 base-perf.txt pr-perf.txt > perf-stat.txt 2>&1 || true

    - name: Upload benchmark results
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: benchmark-results
        path: bench-results/
        if-no-files-found: ignore
