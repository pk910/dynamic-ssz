name: Benchmarks

on:
  pull_request:
    branches: [ master, main ]

concurrency:
  group: benchmark-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
    - name: Checkout PR
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        path: pr

    - name: Checkout base
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        ref: ${{ github.event.pull_request.base.sha }}
        path: base

    - name: Set up Go
      uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
      with:
        go-version: '1.25.8'

    - name: Install benchstat
      run: go install golang.org/x/perf/cmd/benchstat@v0.0.0-20260312031701-16a31bc5fbd0

    - name: Prepare output directory
      run: |
        mkdir -p bench-results
        echo "${{ github.event.pull_request.number }}" > bench-results/pr-number.txt

    - name: Download test data
      run: |
        cd pr/tests/perftests
        ./setup_testdata.sh
        cp -r res ../../../base/tests/perftests/res 2>/dev/null || true

    - name: Generate codegen (PR)
      run: |
        cd pr/tests/perftests
        go generate ./...

    - name: Generate codegen (base)
      continue-on-error: true
      run: |
        cd base/tests/perftests
        go generate ./...

    - name: Cache Go modules
      uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-go-bench-${{ hashFiles('pr/tests/perftests/go.sum') }}

    - name: Sync benchmark harness to base
      run: |
        set -euo pipefail

        synced=0
        while IFS= read -r dir; do
          if [ -z "$dir" ] || [ ! -d "base/$dir" ]; then
            continue
          fi

          rm -f "base/$dir"/*_test.go

          copied=0
          while IFS= read -r test_file; do
            cp "pr/$test_file" "base/$test_file"
            copied=$((copied + 1))
          done < <(cd pr && git ls-files "$dir/*_test.go")

          if [ "$copied" -eq 0 ]; then
            continue
          fi

          synced=$((synced + 1))
          echo "Synced benchmark harness in $dir ($copied test files)"
        done < <(
          cd pr
          git grep -l '^[[:space:]]*func Benchmark' -- '*_test.go' |
            xargs -r -n1 dirname |
            sort -u
        )

        echo "Synced benchmark harness for $synced packages from PR into base checkout"

    - name: Run library benchmarks (base)
      continue-on-error: true
      run: |
        cd base
        go test -run=^$ -bench=. -benchmem -count=5 -timeout=10m ./... > "$GITHUB_WORKSPACE/bench-results/base-lib.txt"

    - name: Run library benchmarks (PR)
      run: |
        cd pr
        go test -run=^$ -bench=. -benchmem -count=5 -timeout=10m ./... > "$GITHUB_WORKSPACE/bench-results/pr-lib.txt"

    - name: Run perf benchmarks (base)
      continue-on-error: true
      run: |
        cd base/tests/perftests
        go test -run=^$ -bench=. -benchmem -count=5 -timeout=30m > "$GITHUB_WORKSPACE/bench-results/base-perf.txt"

    - name: Run perf benchmarks (PR)
      run: |
        cd pr/tests/perftests
        go test -run=^$ -bench=. -benchmem -count=5 -timeout=30m > "$GITHUB_WORKSPACE/bench-results/pr-perf.txt"

    - name: Run benchstat comparisons
      run: |
        cd "$GITHUB_WORKSPACE/bench-results"
        benchstat base-lib.txt pr-lib.txt > lib-stat.txt 2>&1 || true
        benchstat base-perf.txt pr-perf.txt > perf-stat.txt 2>&1 || true

    - name: Upload benchmark results
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: benchmark-results
        path: bench-results/
        if-no-files-found: ignore
