name: Tests & Coverage

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'

permissions:
  contents: read

jobs:
  # Run spec tests in matrix (no coverage upload here)
  spec-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.25.8', 1.26.x]
        preset: [mainnet, minimal]

    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Set up Go
      uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
      with:
        go-version: ${{ matrix.go-version }}

    - name: Cache Go modules
      uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ matrix.go-version }}-spectests-${{ hashFiles('spectests/go.sum') }}

    - name: Download dependencies (spectests)
      run: |
        cd spectests
        go mod download

    - name: Get spec tests version
      id: spec-version
      run: |
        # Get latest non-prerelease version
        VERSION=$(curl -s https://api.github.com/repos/ethereum/consensus-spec-tests/releases | \
          jq -r '.[] | select(.prerelease == false and .draft == false) | .tag_name' | \
          grep -v -E '(alpha|beta|rc|pre)' | \
          head -1)

        # Fallback if no version found
        if [ -z "$VERSION" ]; then
          VERSION="v1.5.0"
        fi

        echo "Spec tests version: ${VERSION}"
        echo "version=${VERSION}" >> $GITHUB_OUTPUT

    - name: Cache consensus spec tests
      uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
      with:
        path: spectests/consensus-spec-tests
        key: consensus-spec-tests-${{ matrix.preset }}-${{ steps.spec-version.outputs.version }}

    - name: Setup consensus spec test data
      run: |
        cd spectests
        ./setup_test_data.sh setup ${{ matrix.preset }}
        echo "CONSENSUS_SPEC_TESTS_DIR=$(./setup_test_data.sh export ${{ matrix.preset }})" >> $GITHUB_ENV

    - name: Run spec tests with coverage
      run: |
        cd spectests
        ./run_tests.sh ${{ matrix.preset }}
      env:
        CONSENSUS_SPEC_TESTS_DIR: ${{ env.CONSENSUS_SPEC_TESTS_DIR }}

    - name: Upload spec test coverage artifacts
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: coverage-spec-go${{ matrix.go-version }}-${{ matrix.preset }}
        path: spectests/spec-coverage.out

  # Run unit tests once on latest Go version and combine with spec test coverage
  unit-tests-and-coverage:
    runs-on: ubuntu-latest
    needs: spec-tests
    if: always()

    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Set up Go
      uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
      with:
        go-version: '1.25.8'

    - name: Cache Go modules
      uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-go-1.25.8-${{ hashFiles('**/go.sum') }}

    - name: Download dependencies
      run: go mod download

    - name: Run codegen tests with coverage
      run: |
        mkdir coverage
        export GOCOVERDIR=$(pwd)/coverage
        go generate ./...
        go tool covdata textfmt -i=coverage -o=coverage-codegen.txt
    - name: Run unit tests with coverage
      run: |
        go test -v -race -coverprofile=coverage-unit.txt -coverpkg=./... ./...

    - name: Run unit tests with coverage (without cgo)
      run: |
        CGO_ENABLED=0 go test -v -coverprofile=coverage-unit-nocgo.txt -coverpkg=./... ./...

    - name: Run 32-bit tests with coverage
      run: |
        GOARCH=386 CGO_ENABLED=0 go test -v -coverprofile=coverage-unit-386.txt -coverpkg=./... ./...

    - name: Download spec test coverage artifacts
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        pattern: coverage-spec-go1.25.8-*
        path: spec-coverage-artifacts

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}

    - name: Upload coverage artifacts
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: final-coverage-report
        path: |
          coverage-codegen.txt
          coverage-unit.txt
          coverage-unit-nocgo.txt
          coverage-unit-386.txt

  # Run govulncheck to detect known vulnerabilities in dependencies
  govulncheck:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Set up Go
      uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
      with:
        go-version: '1.25.8'

    - name: Run govulncheck
      run: |
        go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
        govulncheck ./...

  # Quick smoke fuzz test to catch regressions early
  fuzz-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Set up Go
      uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
      with:
        go-version: '1.25.8'

    - name: Cache Go modules
      uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-go-1.25.8-fuzz-${{ hashFiles('**/go.sum') }}

    - name: Download dependencies
      run: go mod download

    - name: Run smoke fuzz test
      env:
        GOMEMLIMIT: 4GiB
      run: |
        set -e

        REPORT_DIR="${RUNNER_TEMP}/fuzz-reports"
        mkdir -p "${REPORT_DIR}"

        # Generate a fresh corpus with a random seed
        SEED=$(od -A n -t u4 -N 4 /dev/urandom | tr -d ' ')
        echo "Generating corpus with seed=$SEED"
        rm -f fuzz/corpus/*_gen.go
        go run ./fuzz/cmd/generate -num-types 50 -seed "$SEED" -extended=true

        # Run fuzzer for 30 seconds
        go run ./fuzz/cmd/fuzz \
          -duration 30s \
          -report-dir "${REPORT_DIR}" \
          -workers 2

        # Check for issues
        ISSUES=$(find "${REPORT_DIR}" -maxdepth 2 -name "issue-*" -type d 2>/dev/null | wc -l)
        if [ "$ISSUES" -gt "0" ]; then
          echo "::error::Smoke fuzz found $ISSUES issues!"
          for d in "${REPORT_DIR}"/round-*/issue-*/; do
            if [ -d "$d" ]; then
              echo "--- $(basename "$d") ---"
              cat "$d/details.txt"
            fi
          done
          exit 1
        fi
        echo "Smoke fuzz passed (seed=$SEED)"
